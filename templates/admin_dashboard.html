<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #dfe9f3);
            min-height: 100vh;
            animation: fadePage .6s ease;
        }

        /* PAGE FADE */
        @keyframes fadePage {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #1c1f2b, #2b5876);
            color: white;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .15);
        }

        .navbar h1 {
            font-size: 22px;
            letter-spacing: .5px;
        }

        .logout-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: .3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, .25);
        }

        /* CONTAINER */
        .container {
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        /* GLASS CARDS */
        .welcome,
        .stat-card,
        .quick-links {
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .welcome:hover,
        .stat-card:hover,
        .quick-links:hover {
            transform: translateY(-5px);
        }

        /* STATS GRID */
        .stats {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        /* STAT TEXT */
        .stat-card h3 {
            font-size: 38px;
            margin: 10px 0;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* QUICK LINKS */
        .links {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .link-btn {
            display: block;
            padding: 15px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
            transition: .3s;
            font-weight: 500;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, .35);
        }

        /* REPORT BUTTON (navbar inline style override support) */
        .navbar a {
            transition: .3s;
        }

        .navbar a:hover {
            transform: translateY(-2px);
        }

        /* MESSAGE */
        .message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .error {
            background: #ffe5e5;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

    </style>

</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <h1>Admin Dashboard</h1>

        <div style="display:flex; gap:10px;">

            <!-- Report Button -->
            <a href="{% url 'admin_reports_menu' %}"
               style="background:#28a745;color:white;padding:8px 15px;border-radius:5px;text-decoration:none;">
                📥 Report
            </a>


            <!-- Logout Button -->
            <a href="{% url 'admin_logout' %}" class="logout-btn">
                Logout
            </a>

        </div>
    </div>


    <div class="container">
        <!-- Welcome Message -->
        <div class="welcome">
            <h2>Welcome, {{ admin_username }}! 👑</h2>
            <p>You are logged in as Administrator.</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats">
            <div class="stat-card">
                <h3>{{ total_users }}</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3>{{ total_job_seekers }}</h3>
                <p>Job Seekers</p>
            </div>
            <div class="stat-card">
                <h3>{{ total_job_providers }}</h3>
                <p>Job Providers</p>
            </div>
            <div class="stat-card">
                <h3>{{ total_jobs }}</h3>
                <p>Total Jobs</p>

            </div>
        </div>

        <!-- Quick Links -->
        <div class="quick-links">
            <h2>Quick Actions</h2>
            <div class="links">
                <a href="/admin/" class="link-btn" target="_blank">Django Admin Panel</a>

            </div>
        </div>
    </div>

    <script>
        console.log("Admin Dashboard loaded");
        console.log("Admin:", "{{ admin_username }}");

        // Auto-refresh page every 60 seconds
        setTimeout(function() {
            location.reload();
        }, 60000);
    </script>
</body>
</html>
