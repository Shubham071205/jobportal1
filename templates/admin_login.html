<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Login Box */
        .login-box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            width: 320px;
            animation: fadeIn 1s ease;
        }

        /* Title */
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-size: 14px;
        }

        /* Input Field */
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        /* Input Focus Effect */
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
            outline: none;
            transform: scale(1.02);
        }

        /* Login Button */
        button {
            width: 100%;
            padding: 11px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        /* Button Hover */
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Message */
        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        /* Credentials Box */
        .credentials {
            background: #f1f5ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>


        <form method="POST" action="{% url 'admin_login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label>Username:</label>
                <input type="text" name="username" value="admin" required>
            </div>

            <div class="input-group">
                <label>Password:</label>
                <input type="password" name="password" value="" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="credentials">
            <strong>Default Credentials:</strong><br>
            Username: admin<br>
            Password: admin123
        </div>
    </div>

    <script>
        // Auto-focus on login button
        document.querySelector('button').focus();

        // Auto-submit form if both fields are pre-filled
        window.onload = function() {
            const username = document.querySelector('input[name="username"]').value;
            const password = document.querySelector('input[name="password"]').value;

            if (username && password) {
                document.querySelector('button').innerHTML = 'Logging in...';
                // Optional: Auto-submit
                // document.querySelector('form').submit();
            }
        }
    </script>
</body>
</html>
