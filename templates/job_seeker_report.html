<!DOCTYPE html>
<html>
<head>
    <title>Job Seeker Report</title>

    <style>

        body {
            font-family: Poppins, sans-serif;
            background: #eef2f7;
            padding: 30px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back {
            text-decoration: none;
            color: #28a745;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        /* DOWNLOAD BUTTON */
        .download {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .download:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        /* ADD BUTTON */
        .add {
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .add:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .delete {
            background: #dc3545;
        }

        /* Title */
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }

        th {
            background: #28a745;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

    </style>
</head>

<body>

<div class="top-bar">

    <a href="{% url 'admin_reports_menu' %}" class="back">⬅ Back to Reports</a>

    <div style="display:flex; gap:10px;">

        <!-- ADD JOB SEEKER -->
        <a href="{% url 'signup_jobseeker' %}">
            <button class="btn add">➕ Add</button>
        </a>

        <!-- DOWNLOAD REPORT -->
        <form action="{% url 'download_job_seekers' %}" method="get">
            <button class="btn download">⬇ Download Report</button>
        </form>

    </div>

</div>

<h1>Job Seeker Report</h1>

<table>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Location</th>
        <th>Skills</th>
        <th>Action</th>
    </tr>

    {% for s in seekers %}

        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.username }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.seeker_profile.phone }}</td>
            <td>{{ s.seeker_profile.location }}</td>
            <td>{{ s.seeker_profile.skills }}</td>

            <td>


                <!-- DELETE BUTTON -->
                <form action="{% url 'delete_user' s.id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn delete"
                            onclick="return confirm('Delete this user?')">
                        Delete
                    </button>
                </form>

            </td>

        </tr>

    {% empty %}

        <tr>
            <td colspan="7">No job seekers found</td>
        </tr>

    {% endfor %}

</table>

</body>
</html>
