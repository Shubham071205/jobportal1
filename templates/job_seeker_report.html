<!DOCTYPE html>
<html>
<head>
    <title>Job Seeker Report</title>

    <style>

        body {
            font-family: Poppins, sans-serif;
            background: #eef2f7;
            padding: 30px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back {
            text-decoration: none;
            color: #28a745;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .download {
            background: #28a745;
        }

        .add {
            background: green;
        }

        .delete {
            background: #dc3545;
        }

        /* Title */
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }

        th {
            background: #28a745;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

    </style>
</head>

<body>

<div class="top-bar">

    <a href="{% url 'admin_reports_menu' %}" class="back">⬅ Back to Reports</a>

    <form action="{% url 'download_job_seekers' %}" method="get">
        <button class="btn download">⬇ Download Report</button>
    </form>

</div>

<h1>Job Seeker Report</h1>

<table>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Location</th>
        <th>Skills</th>
        <th>Action</th>
    </tr>

    {% for s in seekers %}

        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.username }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.seeker_profile.phone }}</td>
            <td>{{ s.seeker_profile.location }}</td>
            <td>{{ s.seeker_profile.skills }}</td>

            <td>

                <!-- ADD BUTTON -->
                <a href="{% url 'signup_jobseeker' %}">
                    <button class="btn add">Add</button>
                </a>

                <!-- DELETE BUTTON -->
                <form action="{% url 'delete_user' s.id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn delete"
                            onclick="return confirm('Delete this user?')">
                        Delete
                    </button>
                </form>

            </td>

        </tr>

    {% empty %}

        <tr>
            <td colspan="7">No job seekers found</td>
        </tr>

    {% endfor %}

</table>

</body>
</html>
