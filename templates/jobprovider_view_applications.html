<!DOCTYPE html>
<html>
<head>
    <title>View Applications</title>

    <style>
        body {
            background: #0f2d36;
            font-family: Poppins, sans-serif;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        .item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .status {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
        }

        .pending {
            background: gray;
        }

        .accepted {
            background: green;
        }

        .rejected {
            background: red;
        }

        .actions button {
            padding: 6px 12px;
            margin-right: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .approve {
            background: #28a745;
        }

        .reject {
            background: #dc3545;
        }

    </style>
</head>

<body>

{% include 'jobprovider_sidebar.html' %}

<div class="content">
    <div class="card">

        <h2>Applications Received</h2>

        {% for app in applications %}
            <div class="item">

                <b>{{ app.job.title }}</b><br>

                Applicant: <b>{{ app.seeker.first_name }}</b><br>
                Email: {{ app.seeker.email }}<br><br>

                Status:
                <span class="status {{ app.status|lower }}">
    {{ app.status }}
</span>

                <br><br>

                <div class="actions">

                    <form method="POST" action="{% url 'update_application_status' app.id %}">
                        {% csrf_token %}

                        <button name="status" value="Accepted" class="approve">
                            Approve
                        </button>

                        <button name="status" value="Rejected" class="reject">
                            Reject
                        </button>

                    </form>

                </div>

            </div>

        {% empty %}
            <p>No applications yet.</p>
        {% endfor %}

    </div>
</div>

</body>
</html>
