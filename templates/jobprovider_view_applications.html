<!DOCTYPE html>
<html>
<head>
    <title>View Applications</title>

    <style>

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2d36, #1c4960);
            overflow-x: hidden;
        }

        .content {
            margin-left: 240px;
            padding: 40px;
            animation: fadeSlide 0.8s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .2);
            transition: 0.3s;
        }

        .card h2 {
            margin-bottom: 25px;
            color: #0f2d36;
        }

        .item {
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #f9fbfc;
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }

        .item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, .12);
            background: white;
        }

        .status {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            }
            100% {
                box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
            }
        }

        .pending {
            background: #6c757d;
        }

        .accepted {
            background: #28a745;
        }

        .rejected {
            background: #dc3545;
        }

        .actions button {
            padding: 8px 14px;
            margin-right: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .actions button:hover {
            transform: scale(1.05);
        }

        .approve {
            background: #28a745;
        }

        .approve:hover {
            background: #1e7e34;
        }

        .reject {
            background: #dc3545;
        }

        .reject:hover {
            background: #b02a37;
        }

        /* ripple effect */
        .actions button:active {
            transform: scale(0.95);
        }

    </style>

</head>

<body>

{% include 'jobprovider_sidebar.html' %}

<div class="content">
    <div class="card">

        <h2>Applications Received</h2>

        {% for app in applications %}
            <div class="item">

                <b>{{ app.job.title }}</b><br>

                Applicant: <b>{{ app.seeker.first_name }}</b><br>
                Email: {{ app.seeker.email }}<br><br>

                Status:
                <span class="status {{ app.status|lower }}">
    {{ app.status }}
</span>

                <br><br>

                <div class="actions">

                    <form method="POST" action="{% url 'update_application_status' app.id %}">
                        {% csrf_token %}

                        <button name="status" value="Accepted" class="approve">
                            Approve
                        </button>

                        <button name="status" value="Rejected" class="reject">
                            Reject
                        </button>

                    </form>

                </div>

            </div>

        {% empty %}
            <p>No applications yet.</p>
        {% endfor %}

    </div>
</div>

</body>
</html>
