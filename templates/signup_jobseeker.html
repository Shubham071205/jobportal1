<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>

<body>

<!-- Navbar -->
<div>
    <h1>Admin Dashboard</h1>

    <!-- Report Button -->
    <a href="{% url 'admin_reports_menu' %}">Report</a>

    <!-- Logout Button -->
    <a href="{% url 'admin_logout' %}">Logout</a>
    </div>

<hr>

<!-- Welcome Message -->
<div>
    <h2>Welcome, {{ admin_username }}!</h2>
    <p>You are logged in as Administrator.</p>
</div>

<hr>

<!-- Stats Section -->
<div>
    <h3>{{ total_users }}</h3>
    <p>Total Users</p>

    <h3>{{ total_job_seekers }}</h3>
    <p>Job Seekers</p>

    <h3>{{ total_job_providers }}</h3>
    <p>Job Providers</p>

    <h3>{{ total_jobs }}</h3>
    <p>Total Jobs</p>
    </div>

<hr>

<!-- Quick Links -->
<div>
    <h2>Quick Actions</h2>
    <a href="/admin/" target="_blank">Django Admin Panel</a>
</div>

<script>
    console.log("Admin Dashboard loaded");
    console.log("Admin:", "{{ admin_username }}");

    // Auto-refresh page every 60 seconds
    setTimeout(function () {
        location.reload();
    }, 60000);
</script>

</body>

</html>
