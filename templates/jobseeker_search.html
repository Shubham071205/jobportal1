<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #e0eafc, #cfdef3);
            padding: 40px 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeDown .7s ease;
        }

        .header h1 {
            font-weight: 600;
            color: #203a43;
        }

        /* SEARCH BAR */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeUp .7s ease;
        }

        .search-box input {
            width: 320px;
            padding: 12px 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
            transition: .3s;
        }

        .search-box input:focus {
            transform: scale(1.03);
            box-shadow: 0 6px 14px rgba(0, 0, 0, .15);
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: #203a43;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .search-box button:hover {
            background: #2c5364;
            transform: translateY(-2px);
        }

        /* JOB GRID */
        .jobs {
            max-width: 900px;
            margin: auto;
            display: grid;
            gap: 20px;
        }

        /* JOB CARD */
        .job {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
            transition: .3s;
            animation: fadeIn .6s ease both;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 25px rgba(0, 0, 0, .12);
        }

        .job strong {
            font-size: 18px;
            color: #203a43;
        }

        .job span {
            font-size: 13px;
            color: #777;
        }

        /* BUTTON */
        .job button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #203a43;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .job button:hover {
            background: #2c5364;
            transform: scale(1.05);
        }

        /* ANIMATIONS */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .job {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

    </style>
</head>

<body>

<div class="header">
    <h1>🔍 Search Jobs</h1>
</div>

<form method="GET" class="search-box">
    <input type="text" name="q" placeholder="Search job..." value="{{ query }}">
    <button type="submit">Search</button>
</form>

<div class="jobs">

{% for job in jobs %}
    <div class="job">

        <div>
            <strong>{{ job.title }}</strong><br>
            <span>{{ job.provider.first_name }} • {{ job.location }}</span>
        </div>

        <a href="{% url 'job_detail' job.id %}">
            <button>View</button>
        </a>

    </div>

{% empty %}
    <p style="text-align:center;color:#555;">No jobs found.</p>
{% endfor %}

</div>

</body>
</html>
