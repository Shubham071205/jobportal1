<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex; /* IMPORTANT */
            background: linear-gradient(120deg, #e0eafc, #cfdef3);
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            background: #203a43;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar a {
            text-decoration: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: #2c5364;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 40px 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 600;
            color: #203a43;
        }

        /* SEARCH BAR */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 320px;
            padding: 12px 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: #203a43;
            color: white;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #2c5364;
        }

        /* JOB GRID */
        .jobs {
            max-width: 900px;
            margin: auto;
            display: grid;
            gap: 20px;
        }

        /* JOB CARD */
        .job {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job strong {
            font-size: 18px;
            color: #203a43;
        }

        .job span {
            font-size: 13px;
            color: #777;
        }

        .job button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #203a43;
            color: white;
            cursor: pointer;
        }

        .job button:hover {
            background: #2c5364;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                justify-content: space-around;
            }

            .main {
                padding: 20px;
            }
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Job Seeker</h2>
    <a href="{% url 'dashboard_jobseeker' %}">Dashboard</a>
    <a href="{% url 'jobseeker_search' %}">Search Jobs</a>
    <a href="{% url 'jobseeker_applications' %}">My Applications</a>
    <a href="{% url 'jobseeker_profile' %}">My Profile</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="header">
        <h1>🔍 Search Jobs</h1>
    </div>

    <form method="GET" class="search-box">
        <input type="text" name="q" placeholder="Search job..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>

    <div class="jobs">
        {% for job in jobs %}
            <div class="job">
                <div>
                    <strong>{{ job.title }}</strong><br>
                    <span>{{ job.provider.first_name }} • {{ job.location }}</span>
                </div>

                <a href="{% url 'job_detail' job.id %}">
                    <button>View</button>
                </a>
            </div>
        {% empty %}
            <p style="text-align:center;color:#555;">No jobs found.</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
